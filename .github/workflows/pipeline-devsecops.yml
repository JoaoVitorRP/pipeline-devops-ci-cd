# Nome do pipeline que será exibido na aba "Actions" do GitHub
name: Pipeline CI/CD

# Gatilho que vai disparar a automação
on:
  push:
    # O pipeline só vai rodar quando houver um push na branch "main"
    branches:
      - main

# O que o pipeline realmente vai fazer
jobs:
  # Conjunto de tarefas chamado "build"
  build:
    # Especifica que o GitHub deve criar uma máquina virtual temporária com o Ubuntu mais recente para rodar os comandos
    runs-on: ubuntu-latest

    # Lista de passos sequenciais que a máquina virtual vai executar
    steps:
      # Passo 1: Baixa o código do repositório para dentro da máquina virtual temporária do GitHub
      - name: Checkout code
        uses: actions/checkout@v6

      # Passo 2: Setup do node
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Passo 3: Instala as dependências
      - name: Install dependencies
        run: npm install

      # Passo 4: Faz uma simulação de testes do código antes do deploy
      - name: Run tests
        run: npm test

      # Passo 5: Faz o scan do código com SonarQube
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          # Injeta a senha de acesso configurada no GitHub Secrets
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
          # Injeta o endereço do servidor gratuito do SonarCloud configurado no GitHub Secrets
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}

      # Passo 6: Análise dinâmica de segurança com OWASP ZAP
      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          # Alvo do OWASP ZAP (nesse caso, a máquina ec2)
          target: "http://${{ secrets.EC2_HOST }}"

          # Foi deixado como false para o pipeline não travar com erros comuns em sites estáticos. Em um pipeline real, deveria estar habilitado
          fail_action: false

          # Criação de um issue no GitHub com as vulnerabilidades encontradas
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: "Relatório de Vulnerabilidades - OWASP ZAP"

  # Conjunto de tarefas chamado "deploy"
  deploy:
    # Especifica que o GitHub deve criar uma máquina virtual temporária com o Ubuntu mais recente para rodar os comandos
    runs-on: ubuntu-latest
    # Só irá rodar após a etapa de build terminar com sucesso
    needs: build

    # Lista de passos sequenciais que a máquina virtual vai executar
    steps:
      # Passo 1: Baixa o código do repositório para dentro da máquina virtual temporária do GitHub
      - name: Checkout code
        uses: actions/checkout@v6

      # Passo 2: Transfere os arquivos do projeto para a ec2
      - name: Copy files to EC2 via SCP
        uses: appleboy/scp-action@v1
        with:
          # Injeta o IP público atual da instância ec2, que está salvo no GitHub Secrets
          host: ${{ secrets.EC2_HOST }}
          # Usuário padrão do sistema operacional Amazon Linux para a conexão
          username: ec2-user
          # Injeta o conteúdo do arquivo da SSH Key do Learner Lab guardado no GitHub Secrets
          key: ${{ secrets.EC2_SSH_KEY }}
          # Define a origem dos arquivos (nesse caso pega tudo o que está na raiz do projeto)
          source: "./*"
          # Define o destino exato dentro do servidor Linux, onde a imagem será construída
          target: "/home/ec2-user/app"

      # Passo 3: Executa o script de deploy automatizado utilizando containers Docker
      - name: Docker Deployment via SSH
        uses: appleboy/ssh-action@v1
        with:
          # Injeta o IP público atual da instância ec2, que está salvo no GitHub Secrets
          host: ${{ secrets.EC2_HOST }}
          # Usuário padrão do sistema operacional Amazon Linux para a conexão
          username: ec2-user
          # Injeta o conteúdo do arquivo da SSH Key do Learner Lab guardado no GitHub Secrets
          key: ${{ secrets.EC2_SSH_KEY }}
          # cd /home/ec2-user/app: Navega até a pasta em que os arquivos do projeto estão localizados
          # docker tag site-estatico-devops:latest site-estatico-devops:backup || true: Cria uma cópia de segurança da imagem atual caso o novo build falhe
          # docker build -t site-estatico-devops:latest .: Constrói a imagem do Docker a partir do Dockerfile
          # docker stop container-site || true: Interrompe o container antigo
          # docker rm container-site || true: Remove o container antigo
          # docker run -d --name container-site -p 80:80 site-estatico-devops:latest: Inicializa o novo container em segundo plano, mapeando a porta 80 da ec2 para a 80 do container
          script: |
            echo "Iniciando script de deploy em container..."
            cd /home/ec2-user/app
            docker tag site-estatico-devops:latest site-estatico-devops:backup || true
            docker build -t site-estatico-devops:latest .
            docker stop container-site || true
            docker rm container-site || true
            docker run -d --name container-site -p 80:80 site-estatico-devops:latest
            echo "Deploy em container concluído com sucesso!"

      # Passo 4: Caso ocorra uma falha, ativa o rollback automaticamente restaurando a imagem estável
      - name: Trigger Rollback on Failure
        # Garante que este passo só rode se os passos anteriores derem algum erro
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          # Injeta o IP público atual da instância ec2, que está salvo no GitHub Secrets
          host: ${{ secrets.EC2_HOST }}
          # Usuário padrão do sistema operacional Amazon Linux para a conexão
          username: ec2-user
          # Injeta o conteúdo do arquivo da SSH Key do Learner Lab guardado no GitHub Secrets
          key: ${{ secrets.EC2_SSH_KEY }}
          # docker stop container-site || true: Interrompe o container defeituoso
          # docker rm container-site || true: Remove o container defeituoso
          # docker run -d --name container-site -p 80:80 site-estatico-devops:backup: Inicializa um novo container utilizando a imagem estável de backup guardada anteriormente
          script: |
            echo "O deploy falhou! Iniciando Rollback..."
            docker stop container-site || true
            docker rm container-site || true
            docker run -d --name container-site -p 80:80 site-estatico-devops:backup
            echo "Rollback concluído. O site foi restaurado para a versão anterior com sucesso!"
